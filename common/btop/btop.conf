# btop — System resource monitor
# Catppuccin Mocha theme is available as a built-in theme

# Theme (catppuccin_mocha ships with btop >= 1.3)
color_theme = "catppuccin_mocha"

# General
theme_background = false
vim_keys = true
rounded_corners = true
update_ms = 2000
shown_boxes = "cpu mem net proc"

# Processes
proc_sorting = "cpu lazy"
proc_reversed = false
proc_tree = false
proc_per_core = false
proc_filter_kernel = true
proc_gradient = true

# CPU
cpu_graph_upper = "total"
cpu_graph_lower = "total"
show_cpu_freq = true
show_coretemp = true

# Memory
mem_graphs = true
swap_disk = true
show_disks = true

# Network
net_download = 100
net_upload = 100
net_auto = true
