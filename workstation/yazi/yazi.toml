# yazi — file manager configuration

[mgr]
show_hidden = true
sort_dir_first = true
sort_by = "natural"
linemode = "size"
ratio = [1, 3, 4]
scrolloff = 5

[preview]
wrap = "yes"
tab_size = 2
max_width = 1000
max_height = 1000
image_delay = 30
image_quality = 80

[opener]
edit = [
  { run = '$EDITOR %s', block = true, for = "unix" },
]
open = [
  { run = 'xdg-open %s', orphan = true, for = "linux" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "*/javascript", use = "edit" },
  { mime = "*/xml", use = "edit" },
  { mime = "*/x-shellscript", use = "edit" },
  { url = "*.toml", use = "edit" },
  { url = "*.yaml", use = "edit" },
  { url = "*.yml", use = "edit" },
  { url = "*.conf", use = "edit" },
  { url = "*.ini", use = "edit" },
  { url = "*.md", use = "edit" },
  { url = "*.lua", use = "edit" },
]
